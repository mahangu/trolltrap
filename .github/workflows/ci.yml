name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: PHP ${{ matrix.php }} lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Lint all PHP files
        run: |
          find . -type f -name '*.php' \
            -not -path './vendor/*' \
            -not -path './node_modules/*' \
            -print0 \
          | xargs -0 -n1 -P4 php -l

  phpcs:
    name: WordPress Coding Standards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none
          tools: composer:v2, cs2pr

      - name: Install PHPCS + WPCS
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --no-interaction --no-progress \
            squizlabs/php_codesniffer \
            wp-coding-standards/wpcs \
            phpcsstandards/phpcsutils \
            phpcsstandards/phpcsextra \
            dealerdirect/phpcodesniffer-composer-installer
          COMPOSER_BIN="$(composer global config bin-dir --absolute --quiet)"
          COMPOSER_HOME_DIR="$(composer global config home --quiet)"
          echo "$COMPOSER_BIN" >> "$GITHUB_PATH"
          # Register the WordPress standards explicitly so the run does not
          # depend on the composer-installer plugin having executed.
          "$COMPOSER_BIN/phpcs" --config-set installed_paths \
            "$COMPOSER_HOME_DIR/vendor/wp-coding-standards/wpcs,$COMPOSER_HOME_DIR/vendor/phpcsstandards/phpcsutils,$COMPOSER_HOME_DIR/vendor/phpcsstandards/phpcsextra"

      - name: Verify WordPress standard is installed
        run: phpcs -i

      - name: Run PHPCS
        run: phpcs --report-full --report-checkstyle=phpcs-report.xml

      - name: Annotate PR with PHPCS findings
        if: failure()
        run: cs2pr phpcs-report.xml

  playground:
    name: Playground (WP ${{ matrix.wp }}, PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        wp: ['6.5', '6.6', 'latest', 'nightly']
        php: ['8.2']
        include:
          # Extra PHP coverage on a single stable WP version.
          - wp: 'latest'
            php: '8.0'
          - wp: 'latest'
            php: '8.3'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Playground blueprint
        run: |
          npx --yes @wp-playground/cli@latest \
            run-blueprint \
            --blueprint=.github/playground/blueprint.json \
            --wp="${{ matrix.wp }}" \
            --php="${{ matrix.php }}" \
            --mount="$PWD:/wordpress/wp-content/plugins/trolltrap"
