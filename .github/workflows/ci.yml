name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  lint:
    name: PHP ${{ matrix.php }} lint
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.0', '8.1', '8.2', '8.3']
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          coverage: none

      - name: Lint all PHP files
        run: |
          find . -type f -name '*.php' \
            -not -path './vendor/*' \
            -not -path './node_modules/*' \
            -print0 \
          | xargs -0 -n1 -P4 php -l

  phpcs:
    name: WordPress Coding Standards
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer:v2, cs2pr

      - name: Install PHPCS + WPCS
        run: |
          composer global config --no-plugins allow-plugins.dealerdirect/phpcodesniffer-composer-installer true
          composer global require --no-interaction --no-progress \
            squizlabs/php_codesniffer \
            wp-coding-standards/wpcs \
            phpcsstandards/phpcsutils \
            phpcsstandards/phpcsextra \
            dealerdirect/phpcodesniffer-composer-installer
          echo "$(composer global config bin-dir --absolute --quiet)" >> "$GITHUB_PATH"

      - name: Verify installed standards
        run: phpcs -i

      - name: Run PHPCS
        run: phpcs --report=full --report-checkstyle=phpcs-report.xml || true

      - name: Annotate PR with PHPCS findings
        if: always()
        run: cs2pr --graceful-warnings phpcs-report.xml || true

  playground:
    name: Playground (WP ${{ matrix.wp }}, PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        wp: ['6.5', '6.6', 'latest', 'nightly']
        php: ['8.2']
        include:
          # Extra PHP coverage on a single stable WP version.
          - wp: 'latest'
            php: '8.0'
          - wp: 'latest'
            php: '8.3'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run Playground blueprint
        run: |
          npx --yes @wp-playground/cli@latest \
            run-blueprint \
            --blueprint=.github/playground/blueprint.json \
            --wp="${{ matrix.wp }}" \
            --php="${{ matrix.php }}" \
            --mount="$PWD:/wordpress/wp-content/plugins/trolltrap"
